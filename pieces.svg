        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .detail {
        fill: none;
        stroke: var(--piece-stroke, currentColor);
        stroke-width: 4;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .cut {
        fill: none;
        stroke: var(--piece-stroke, currentColor);
        stroke-width: 5;
        stroke-linecap: round;
      }
    </style>

    <symbol id="pawn" viewBox="0 0 100 100">
